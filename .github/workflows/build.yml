name: Build and Push Docker Image

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Magic Nix Cache
        uses: determinate-systems/magic-nix-cache-action@v2

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: nix build .#docker

      - name: Load and Push to GHCR
        run: |
          docker load < result
          IMAGE_ID_GHCR=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          IMAGE_ID_GHCR=$(echo $IMAGE_ID_GHCR | tr '[:upper:]' '[:lower:]')

          echo "Tagging and pushing to $IMAGE_ID_GHCR"

          docker tag ip-nosqd:latest $IMAGE_ID_GHCR:latest
          docker tag ip-nosqd:latest $IMAGE_ID_GHCR:${{ github.sha }}

          docker push $IMAGE_ID_GHCR:latest
          docker push $IMAGE_ID_GHCR:${{ github.sha }}
